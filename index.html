  h+='</tbody></table></div></div>';

  h+='<div class="card"><h2>📊 แผน vs จริง — รายละเอียดทุก Job <span class="badge b-prod">🏭 PROD/PC</span></h2>'+
     '<div class="sub">เป้า/วัน = CapValue × เวลาเดินจริง (ทุก Job) · %Ach = ประสิทธิภาพเทียบกำลัง cap · 🟣 = งานนอกแผน</div>'+
     '<div class="chips" id="chips">'+chip('all','ทั้งหมด',true)+chip('plan','ทำตามแผน')+chip('Unplanned','🟣 นอกแผน')+chip('Bottleneck','🔴 ตกเป้า')+chip('Behind','🟠 Behind')+chip('OnTarget','🟢 OnTarget')+chip('OverProduction','🔵 Over')+'</div>'+
     '<div class="tw"><table id="detTbl"><thead><tr><th>เลขใบงาน</th><th>ชื่องาน</th><th>เครื่อง</th><th>หน่วย</th><th class="num">เป้า/วัน</th><th class="num">จริง</th><th>%Ach</th><th>สถานะ</th><th>เวลาผลิต</th><th class="num">cap จริง/master</th><th class="num">เข้าเป้า(cap)</th></tr></thead><tbody id="detBody"></tbody></table></div>'+
     '<div class="note">เป้า/วัน = CapValue × เวลาเดินจริง · "⏳ รอเติม master" = ยังไม่มีแถว CAP ตรงเครื่อง/ขนาด/ความหนา · เวลา net ติดลบ = คีย์ setup เกิน</div></div>';
  // BLOCK 6
  h+='<div class="card"><h2>🔧 Breakdown Analysis <span class="badge b-maint">🔧 MAINT</span></h2>'+
     '<div class="sub">Downtime รายเครื่อง+สาเหตุ · เรียงนาทีมาก→น้อย · รวม '+fmt(D.bd_total)+' นาที</div><div class="tw"><table>'+
     '<thead><tr><th>อันดับ</th><th>เครื่อง</th><th>เลขใบงาน</th><th class="num">นาที</th><th class="num">ครั้ง</th><th>สาเหตุ</th></tr></thead><tbody>';
  D.breakdown.forEach((b,i)=>{const f=(b.cause||'').split(' / ').filter(x=>x.trim()).length||1;
    h+='<tr><td class="num">'+(i+1)+'</td><td>'+b.mc+'</td><td class="mono">'+b.job+'</td><td class="num"><span class="pill '+(b.minutes>=100?'p-red':'p-org')+'">'+fmt(b.minutes)+'</span></td><td class="num">'+f+'</td><td style="font-size:11.5px">'+b.cause+'</td></tr>';});
  h+='</tbody></table></div></div>';
  // BLOCK 7
  h+='<div class="card"><h2>📦 FG เสร็จส่งคลัง + WIP ค้าง <span class="badge b-maint">🔧</span><span class="badge b-prod">🏭</span></h2>'+
     '<div class="sub">FG = ผลผลิตจากสถานีแพ็ค (PA/ล้าง) · WIP = งานระหว่างขั้น (รีด/ตัด/เกลียว/ลบคม/ข้อต่อ)</div><div class="two">';
  h+='<div><h2 style="font-size:15px">📦 FG เข้าคลัง — '+fmt(D.fg_total)+'</h2><div class="tw"><table><thead><tr><th>เลขใบงาน</th><th>เครื่อง(แพ็ค)</th><th class="num">จำนวน</th><th>หน่วย</th></tr></thead><tbody>';
  D.fg.forEach(d=>{h+='<tr><td class="mono">'+d.job+'</td><td>'+d.mc+'</td><td class="num">'+fmt(d.qty)+'</td><td>'+d.unit+'</td></tr>';});
  h+='</tbody></table></div></div><div><h2 style="font-size:15px">🔄 WIP ระหว่างขั้น — '+D.wip.length+' งาน</h2><div class="tw"><table><thead><tr><th>เลขใบงาน</th><th>เครื่อง</th><th class="num">จำนวน</th><th>สถานะ</th></tr></thead><tbody>';
  D.wip.forEach(d=>{h+='<tr><td class="mono">'+d.job+'</td><td>'+d.mc+'</td><td class="num">'+fmt(d.qty)+'</td><td>'+stPill(d.status)+'</td></tr>';});
  h+='</tbody></table></div></div></div></div>';
  // SLIT
  if(D.slit.length){h+='<div class="card"><h2>🪚 สลิทเตอร์ (OSE) — SlitWeight (kg) <span class="badge b-prod">🏭</span><span class="badge b-maint">🔧</span></h2><div class="tw"><table>'+
    '<thead><tr><th>OSE</th><th>สูตร</th><th class="num">ลูก ทำ/แผน</th><th>Ach%</th><th class="num">Net(kg)</th><th>Yield%</th><th class="num">cap kg/min</th><th>vs master</th></tr></thead><tbody>';
    D.slit.forEach(s=>{let vs='—';
      if(s.diff!=null&&s.master!=null){const dc=s.diff>=0?'diffp':'diffn';vs='<span class="'+dc+'">'+(s.diff>=0?'+':'')+s.diff+'%</span> (master '+s.master+(s.master_src==='cap_direct'?' ≈':'')+')';}
      else if(s.master==null){vs='<span style="color:#64748b">— ไม่มี master</span>';}
      h+='<tr><td class="mono">'+s.ose+(s.not_in_plan?' <span class="unchip">นอกแผนวันนี้</span>':'')+'</td><td style="font-size:11.5px">'+s.formula+'</td><td class="num">'+fmt(s.coils)+'/'+fmt(s.planc)+'</td>'+
      '<td><span class="pill p-grn">'+pctTxt(s.ach)+'</span></td><td class="num">'+fmt(s.net)+'</td><td class="num">'+(s.yld!=null?s.yld+'%':'—')+'</td><td class="num">'+(s.cap!=null?s.cap:'—')+'</td><td class="num">'+vs+'</td></tr>';});
    h+='</tbody></table></div></div>';}
  // BLOCK 8
  h+='<div class="ft">ZIGA Innovation PCL · Production Control Dashboard · Powered by Microsoft 365</div>';
  document.getElementById('app').innerHTML=h; renderDetail('all');
}
function renderDetail(f){
  const D=DATA; let rows=D.detail.slice();
  if(f==='plan') rows=rows.filter(d=>d.kind==='ทำตามแผน');
  else if(f!=='all') rows=rows.filter(d=>d.status===f);
  rows.sort((a,b)=>(a.kind==='ทำตามแผน'?0:1)-(b.kind==='ทำตามแผน'?0:1)||(b.pct||0)-(a.pct||0));
  let h='';
  rows.forEach(d=>{
    const isUn=d.kind==='งานนอกแผน'; let tgt,achTxt,barP,sub;
    if(isUn){
      if(d.cap_pending){tgt='<span style="color:#7c3aed">⏳ รอเติม master</span>';achTxt='—';barP=null;sub='<span class="pill p-pur">⏳ รอเติม master</span>';}
      else{tgt=fmt(d.cap_target);barP=d.cap_ach;achTxt=d.cap_ach+'%';const cls=d.cap_ach>=90?'p-grn':d.cap_ach>=70?'p-org':'p-red';sub='<span class="pill '+cls+'">'+d.cap_sub+' '+d.cap_ach+'%</span>';}
    }else{tgt=fmt(d.qplan);barP=d.pct;achTxt=pctTxt(d.pct);sub=d.cap_diff!=null?'<span class="'+(d.cap_diff>=0?'diffp':'diffn')+'">'+(d.cap_diff>=0?'+':'')+d.cap_diff+'%</span>':'—';}
    let cap=(d.cap_real!=null?d.cap_real:'—')+' / '+(d.cap_master!=null?d.cap_master:'—');
    const tWin=(d.t_start&&d.t_start!=='—')?d.t_start+'–'+d.t_finish:'—';
    const tCell='<div class="mono" style="font-size:11.5px">'+tWin+'</div><div style="font-size:10.5px;color:#64748b">เดินจริง '+fmt(d.net)+'′'+(d.bd>0?' · BD '+fmt(d.bd)+'′':'')+'</div>';
    h+='<tr><td class="mono">'+d.job+(isUn?'<span class="unchip">นอกแผน</span>':'')+'</td><td style="font-size:12px">'+d.name+'</td><td>'+d.mc+'</td><td>'+d.unit+'</td>'+
       '<td class="num">'+tgt+(isUn&&!d.cap_pending?'<div style="font-size:10px;color:#7c3aed">cap</div>':'')+'</td><td class="num">'+fmt(d.qty)+'</td>'+
       '<td>'+achTxt+(barP!=null?'<div class="bar"><span style="width:'+Math.min(barP,100)+'%;background:'+barColor(barP)+'"></span></div>':'')+'</td>'+
       '<td>'+stPill(d.status)+'</td><td>'+tCell+'</td><td class="num">'+cap+'</td><td class="num">'+sub+'</td></tr>';
  });
  document.getElementById('detBody').innerHTML=h;
}
function filterDet(btn){document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));btn.classList.add('on');renderDetail(btn.dataset.f);}
window.filterDet=filterDet;
document.addEventListener('DOMContentLoaded',()=>{try{render();}catch(e){document.getElementById('app').innerHTML='<div class="card">error: '+e.message+'</div>';console.error(e);}});
</script></body></html>
