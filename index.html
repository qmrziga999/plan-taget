     '<thead><tr><th>อันดับ</th><th>เครื่อง</th><th>เลขใบงาน</th><th class="num">นาที</th><th class="num">ครั้ง</th><th>สาเหตุ</th></tr></thead><tbody>';
  D.breakdown.forEach((b,i)=>{const f=(b.cause||'').split(' / ').filter(x=>x.trim()).length||1;
    h+='<tr><td class="num">'+(i+1)+'</td><td>'+b.mc+'</td><td class="mono">'+b.job+'</td>'+
    '<td class="num"><span class="pill '+(b.minutes>=100?'p-red':'p-org')+'">'+fmt(b.minutes)+'</span></td><td class="num">'+f+'</td><td style="font-size:11.5px">'+b.cause+'</td></tr>';});
  h+='</tbody></table></div></div>';

  // BLOCK 7 — FG + WIP
  h+='<div class="card"><h2>📦 FG เสร็จส่งคลัง + WIP ค้าง <span class="badge b-maint">🔧</span><span class="badge b-prod">🏭</span></h2>'+
     '<div class="sub">FG = ผลผลิตจากสถานีแพ็ค (PA/ล้าง) ส่งคลัง · WIP = งานระหว่างขั้น (รีด/ตัด/เกลียว/ลบคม/ข้อต่อ)</div><div class="two">';
  h+='<div><h2 style="font-size:15px">📦 FG เข้าคลัง — '+fmt(D.fg_total)+'</h2><div class="tw"><table>'+
     '<thead><tr><th>เลขใบงาน</th><th>เครื่อง(แพ็ค)</th><th class="num">จำนวน</th><th>หน่วย</th></tr></thead><tbody>';
  D.fg.forEach(d=>{h+='<tr><td class="mono">'+d.job+'</td><td>'+d.mc+'</td><td class="num">'+fmt(d.qty)+'</td><td>'+d.unit+'</td></tr>';});
  h+='</tbody></table></div></div>';
  h+='<div><h2 style="font-size:15px">🔄 WIP ระหว่างขั้น — '+D.wip.length+' งาน</h2><div class="tw"><table>'+
     '<thead><tr><th>เลขใบงาน</th><th>เครื่อง</th><th class="num">จำนวน</th><th>สถานะ</th></tr></thead><tbody>';
  D.wip.forEach(d=>{h+='<tr><td class="mono">'+d.job+'</td><td>'+d.mc+'</td><td class="num">'+fmt(d.qty)+'</td><td>'+stPill(d.status)+'</td></tr>';});
  h+='</tbody></table></div></div></div></div>';

  // SLIT card (in block 5 area as separate)
  if(D.slit.length){h+='<div class="card"><h2>🪚 สลิทเตอร์ (OSE) — SlitWeight (kg) <span class="badge b-prod">🏭</span><span class="badge b-maint">🔧</span></h2><div class="tw"><table>'+
    '<thead><tr><th>OSE</th><th>สูตร</th><th class="num">ลูก ทำ/แผน</th><th>Ach%</th><th class="num">Net(kg)</th><th>Yield%</th><th class="num">cap kg/min</th><th>vs master</th></tr></thead><tbody>';
    D.slit.forEach(s=>{
      let vs='—';
      if(s.diff!=null && s.master!=null){const dc=s.diff>=0?'diffp':'diffn';
        vs='<span class="'+dc+'">'+(s.diff>=0?'+':'')+s.diff+'%</span> (master '+s.master+(s.master_src==='cap_direct'?' ≈':'')+')';}
      else if(s.master==null){vs='<span style="color:#64748b">— ไม่มี master</span>';}
      h+='<tr><td class="mono">'+s.ose+(s.not_in_plan?' <span class="pill p-pur" style="font-size:10px">นอกแผนวันนี้</span>':'')+'</td><td style="font-size:11.5px">'+s.formula+'</td><td class="num">'+fmt(s.coils)+'/'+fmt(s.planc)+'</td>'+
      '<td><span class="pill p-grn">'+pctTxt(s.ach)+'</span></td><td class="num">'+fmt(s.net)+'</td><td class="num">'+(s.yld!=null?s.yld+'%':'—')+'</td>'+
      '<td class="num">'+(s.cap!=null?s.cap:'—')+'</td><td class="num">'+vs+'</td></tr>';});
    h+='</tbody></table></div>';
    const s0=D.slit[0];
    if(s0.diff!=null){
      const dir=s0.diff>=0?'สูงกว่า':'ต่ำกว่า';
      const tip=s0.diff>=0?'พิจารณาปรับ CapValue master ขึ้น':'ตรวจสอบสาเหตุที่ทำได้ต่ำกว่า master (ความหนา/หน้ากว้างม้วน/ปัญหาเครื่อง)';
      let extra=s0.not_in_plan?' · OSE นี้ไม่อยู่ใน plan วันนี้ (งานต่อเนื่อง) → master อ้างอิงจาก CAP (≈)':'';
      h+='<div class="note">cap จริง '+s0.cap+' kg/นาที '+dir+' master '+s0.master+' = '+(s0.diff>=0?'+':'')+s0.diff+'% → '+tip+extra+'</div>';
    }
    h+='</div>';}

  // BLOCK 8 — FOOTER
  h+='<div class="ft">ZIGA Innovation PCL · Production Control Dashboard · Powered by Microsoft 365</div>';

  document.getElementById('app').innerHTML=h;
  renderDetail('all');
}

function ei(v,l){return '<div class="ei"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}
function kpi(v,l){return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}
function sc(k,n,t,c){return '<div class="sc"><div class="n">'+n+'</div><div class="t"><span class="pill '+c+'">'+t+'</span></div></div>';}
function chip(k,l,on){return '<button class="chip'+(on?' on':'')+'" data-f="'+k+'" onclick="filterDet(this)">'+l+'</button>';}

function renderDetail(f){
  const D=DATA; let rows=D.detail.slice();
  if(f==='plan') rows=rows.filter(d=>d.kind==='ทำตามแผน');
  else if(f!=='all') rows=rows.filter(d=>d.status===f);
  rows.sort((a,b)=>(a.kind==='ทำตามแผน'?0:1)-(b.kind==='ทำตามแผน'?0:1) || (b.pct||0)-(a.pct||0));
  let h='';
  rows.forEach(d=>{
    const isUn = d.kind==='งานนอกแผน';
    let tgt, achTxt, barP, sub;
    if(isUn){
      if(d.cap_pending){ tgt='<span style="color:#7c3aed">⏳ รอเติม master</span>'; achTxt='—'; barP=null;
        sub='<span class="pill p-pur">⏳ รอเติม master</span>'; }
      else { tgt=fmt(d.cap_target); barP=d.cap_ach; achTxt=d.cap_ach+'%';
        const cls=d.cap_ach>=90?'p-grn':d.cap_ach>=70?'p-org':'p-red';
        sub='<span class="pill '+cls+'">'+d.cap_sub+' '+d.cap_ach+'%</span>'; }
    } else {
      tgt=fmt(d.qplan); barP=d.pct; achTxt=pctTxt(d.pct);
      sub = d.cap_diff!=null ? '<span class="'+(d.cap_diff>=0?'diffp':'diffn')+'">'+(d.cap_diff>=0?'+':'')+d.cap_diff+'%</span>' : '—';
    }
    let cap=(d.cap_real!=null?d.cap_real:'—')+' / '+(d.cap_master!=null?d.cap_master:'—');
    h+='<tr><td class="mono">'+d.job+'</td><td style="font-size:12px">'+d.name+'</td><td>'+d.mc+'</td><td>'+d.unit+'</td>'+
       '<td class="num">'+tgt+(isUn&&!d.cap_pending?'<div style="font-size:10px;color:#7c3aed">cap</div>':'')+'</td><td class="num">'+fmt(d.qty)+'</td>'+
       '<td>'+achTxt+(barP!=null?'<div class="bar"><span style="width:'+Math.min(barP,100)+'%;background:'+barColor(barP)+'"></span></div>':'')+'</td>'+
       '<td>'+stPill(d.status)+'</td><td class="num">'+cap+'</td><td class="num">'+sub+'</td></tr>';
  });
  document.getElementById('detBody').innerHTML=h;
}
function filterDet(btn){
  document.querySelectorAll('#chips .chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on'); renderDetail(btn.dataset.f);
}
window.filterDet=filterDet;
document.addEventListener('DOMContentLoaded',()=>{try{render();}catch(e){document.getElementById('app').innerHTML='<div class="card">เกิดข้อผิดพลาด: '+e.message+'</div>';console.error(e);}});
</script>
</body>
</html>
